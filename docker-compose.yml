version: '3.9'
services:
  backend:
    build:
      context: ./villageverse-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/villageverse
      JWT_SECRET: supersecretkey
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: villageverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
